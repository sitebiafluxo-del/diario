<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 630 890" width="630" height="890">
  <defs>
    <!-- Papel creme suave -->
    <radialGradient id="paperBg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#fff8f6"/>
      <stop offset="100%" stop-color="#fceef0"/>
    </radialGradient>

    <!-- Rosa vermelha-rosada -->
    <radialGradient id="roseDeep" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#f9b8c4"/>
      <stop offset="60%" stop-color="#f07ca0"/>
      <stop offset="100%" stop-color="#d45a80"/>
    </radialGradient>

    <!-- Rosa clara -->
    <radialGradient id="roseLight" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#fde0e8"/>
      <stop offset="60%" stop-color="#f9b8cc"/>
      <stop offset="100%" stop-color="#e885aa"/>
    </radialGradient>

    <!-- Rosa média -->
    <radialGradient id="roseMid" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#fcc8d6"/>
      <stop offset="55%" stop-color="#f394b8"/>
      <stop offset="100%" stop-color="#dc6e96"/>
    </radialGradient>

    <!-- Botão de rosa -->
    <radialGradient id="roseBud" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#fddde6"/>
      <stop offset="100%" stop-color="#e8789e"/>
    </radialGradient>
  </defs>

  <!-- Fundo de papel creme rosado -->
  <rect width="630" height="890" fill="url(#paperBg)"/>

  <!-- Textura sutil de papel -->
  <rect width="630" height="890" fill="none" stroke="#f5dde2" stroke-width="0.3" opacity="0.3"/>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- LINHAS VERTICAIS DECORATIVAS — BORDA ESQUERDA  -->
  <!-- ═══════════════════════════════════════════════ -->

  <!-- Linha rosa escura (mais à esquerda) -->
  <line x1="48" y1="0" x2="48" y2="890" stroke="#e8789e" stroke-width="1.8" opacity="0.6"/>
  <!-- Linha rosa clara (segunda) -->
  <line x1="62" y1="0" x2="62" y2="890" stroke="#f9b8cc" stroke-width="1" opacity="0.5"/>
  <!-- Linha bem fina extra -->
  <line x1="70" y1="0" x2="70" y2="890" stroke="#fcc8d6" stroke-width="0.5" opacity="0.35"/>

  <!-- ═══════════════════════ -->
  <!-- TOPO — ARRANJO DE ROSAS -->
  <!-- ═══════════════════════ -->

  <!-- Ramos e folhas do topo -->
  <!-- Haste principal curva indo da esquerda para a direita -->
  <path d="M 30,0 Q 120,60 280,80 Q 420,95 560,40 Q 600,25 630,30" fill="none" stroke="#a8c896" stroke-width="2.5" opacity="0.75"/>
  <path d="M 60,0 Q 150,50 300,72 Q 450,88 590,30" fill="none" stroke="#c4dab2" stroke-width="1.3" opacity="0.5"/>

  <!-- Folhas ao longo da haste do topo -->
  <!-- Grupo de folhas esquerda -->
  <ellipse cx="95" cy="52" rx="18" ry="9" fill="#8fba78" opacity="0.8" transform="rotate(-30,95,52)"/>
  <ellipse cx="110" cy="45" rx="14" ry="7" fill="#a8cc90" opacity="0.7" transform="rotate(-15,110,45)"/>
  <ellipse cx="145" cy="62" rx="16" ry="8" fill="#8fba78" opacity="0.75" transform="rotate(20,145,62)"/>
  <ellipse cx="165" cy="55" rx="12" ry="6" fill="#b4d4a0" opacity="0.65" transform="rotate(-10,165,55)"/>

  <!-- Grupo de folhas centro -->
  <ellipse cx="285" cy="75" rx="20" ry="9" fill="#8fba78" opacity="0.8" transform="rotate(-5,285,75)"/>
  <ellipse cx="310" cy="68" rx="15" ry="7" fill="#a8cc90" opacity="0.7" transform="rotate(15,310,68)"/>
  <ellipse cx="340" cy="80" rx="17" ry="8" fill="#8fba78" opacity="0.7" transform="rotate(-20,340,80)"/>

  <!-- Grupo de folhas direita -->
  <ellipse cx="460" cy="62" rx="18" ry="8" fill="#8fba78" opacity="0.75" transform="rotate(10,460,62)"/>
  <ellipse cx="500" cy="50" rx="14" ry="7" fill="#a8cc90" opacity="0.7" transform="rotate(-20,500,50)"/>
  <ellipse cx="540" cy="45" rx="16" ry="7" fill="#8fba78" opacity="0.7" transform="rotate(5,540,45)"/>

  <!-- ──── ROSA GRANDE ESQUERDA (principal) ──── -->
  <g transform="translate(140,30)">
    <!-- Pétalas externas -->
    <ellipse cx="0" cy="0" rx="28" ry="18" fill="url(#roseDeep)" opacity="0.85" transform="rotate(0)"/>
    <ellipse cx="0" cy="0" rx="28" ry="18" fill="url(#roseDeep)" opacity="0.85" transform="rotate(45)"/>
    <ellipse cx="0" cy="0" rx="28" ry="18" fill="url(#roseDeep)" opacity="0.85" transform="rotate(90)"/>
    <ellipse cx="0" cy="0" rx="28" ry="18" fill="url(#roseDeep)" opacity="0.85" transform="rotate(135)"/>
    <!-- Pétalas médias -->
    <ellipse cx="0" cy="0" rx="20" ry="13" fill="url(#roseMid)" opacity="0.9" transform="rotate(22)"/>
    <ellipse cx="0" cy="0" rx="20" ry="13" fill="url(#roseMid)" opacity="0.9" transform="rotate(67)"/>
    <ellipse cx="0" cy="0" rx="20" ry="13" fill="url(#roseMid)" opacity="0.9" transform="rotate(112)"/>
    <ellipse cx="0" cy="0" rx="20" ry="13" fill="url(#roseMid)" opacity="0.9" transform="rotate(157)"/>
    <!-- Centro -->
    <circle cx="0" cy="0" r="10" fill="url(#roseLight)" opacity="0.95"/>
    <circle cx="0" cy="0" r="6" fill="#fde0e8" opacity="1"/>
    <circle cx="-1" cy="-1" r="3" fill="#fcc8d6" opacity="0.9"/>
  </g>

  <!-- ──── ROSA MÉDIA CENTRO-TOPO ──── -->
  <g transform="translate(300,60)">
    <ellipse cx="0" cy="0" rx="22" ry="14" fill="url(#roseMid)" opacity="0.85" transform="rotate(0)"/>
    <ellipse cx="0" cy="0" rx="22" ry="14" fill="url(#roseMid)" opacity="0.85" transform="rotate(45)"/>
    <ellipse cx="0" cy="0" rx="22" ry="14" fill="url(#roseMid)" opacity="0.85" transform="rotate(90)"/>
    <ellipse cx="0" cy="0" rx="22" ry="14" fill="url(#roseMid)" opacity="0.85" transform="rotate(135)"/>
    <ellipse cx="0" cy="0" rx="16" ry="10" fill="url(#roseLight)" opacity="0.9" transform="rotate(22)"/>
    <ellipse cx="0" cy="0" rx="16" ry="10" fill="url(#roseLight)" opacity="0.9" transform="rotate(67)"/>
    <ellipse cx="0" cy="0" rx="16" ry="10" fill="url(#roseLight)" opacity="0.9" transform="rotate(112)"/>
    <circle cx="0" cy="0" r="7" fill="#fde8ee" opacity="1"/>
    <circle cx="-1" cy="-1" r="3.5" fill="#fcc8d6" opacity="0.9"/>
  </g>

  <!-- ──── ROSA GRANDE DIREITA ──── -->
  <g transform="translate(510,35)">
    <ellipse cx="0" cy="0" rx="26" ry="16" fill="url(#roseDeep)" opacity="0.85" transform="rotate(10)"/>
    <ellipse cx="0" cy="0" rx="26" ry="16" fill="url(#roseDeep)" opacity="0.85" transform="rotate(55)"/>
    <ellipse cx="0" cy="0" rx="26" ry="16" fill="url(#roseDeep)" opacity="0.85" transform="rotate(100)"/>
    <ellipse cx="0" cy="0" rx="26" ry="16" fill="url(#roseDeep)" opacity="0.85" transform="rotate(145)"/>
    <ellipse cx="0" cy="0" rx="18" ry="12" fill="url(#roseMid)" opacity="0.9" transform="rotate(32)"/>
    <ellipse cx="0" cy="0" rx="18" ry="12" fill="url(#roseMid)" opacity="0.9" transform="rotate(78)"/>
    <ellipse cx="0" cy="0" rx="18" ry="12" fill="url(#roseMid)" opacity="0.9" transform="rotate(122)"/>
    <circle cx="0" cy="0" r="8" fill="url(#roseLight)" opacity="1"/>
    <circle cx="-1" cy="-1" r="4" fill="#fde0e8" opacity="0.9"/>
  </g>

  <!-- Botões de rosa (topo) -->
  <!-- Botão esquerda -->
  <g transform="translate(75,18)">
    <path d="M0,12 Q-8,4 -6,-4 Q0,-10 6,-4 Q8,4 0,12Z" fill="url(#roseBud)" opacity="0.85"/>
    <path d="M0,12 Q2,2 0,-6 Q-2,2 0,12Z" fill="#e8789e" opacity="0.4"/>
    <path d="M-6,-4 Q-10,-8 -8,-14 Q-4,-10 -6,-4Z" fill="#8fba78" opacity="0.8"/>
    <path d="M6,-4 Q10,-8 8,-14 Q4,-10 6,-4Z" fill="#8fba78" opacity="0.8"/>
  </g>
  <!-- Botão centro -->
  <g transform="translate(220,55)">
    <path d="M0,10 Q-7,3 -5,-4 Q0,-9 5,-4 Q7,3 0,10Z" fill="url(#roseBud)" opacity="0.8"/>
    <path d="M-5,-4 Q-9,-7 -7,-12 Q-3,-9 -5,-4Z" fill="#8fba78" opacity="0.75"/>
    <path d="M5,-4 Q9,-7 7,-12 Q3,-9 5,-4Z" fill="#8fba78" opacity="0.75"/>
  </g>
  <!-- Botão direita -->
  <g transform="translate(420,48)">
    <path d="M0,10 Q-7,3 -5,-4 Q0,-9 5,-4 Q7,3 0,10Z" fill="url(#roseBud)" opacity="0.82"/>
    <path d="M-5,-4 Q-9,-7 -7,-12 Q-3,-9 -5,-4Z" fill="#8fba78" opacity="0.75"/>
    <path d="M5,-4 Q9,-7 7,-12 Q3,-9 5,-4Z" fill="#8fba78" opacity="0.75"/>
  </g>

  <!-- Pétalas caindo (topo) -->
  <ellipse cx="195" cy="95" rx="7" ry="4" fill="#f9b8cc" opacity="0.6" transform="rotate(-20,195,95)"/>
  <ellipse cx="370" cy="105" rx="5" ry="3" fill="#f07ca0" opacity="0.5" transform="rotate(15,370,105)"/>
  <ellipse cx="565" cy="78" rx="6" ry="3.5" fill="#f9b8cc" opacity="0.55" transform="rotate(-30,565,78)"/>
  <ellipse cx="85" cy="88" rx="5" ry="3" fill="#fcc8d6" opacity="0.5" transform="rotate(10,85,88)"/>

  <!-- ═══════════════════════════════════════ -->
  <!-- BORDA DIREITA — rosas e folhas laterais -->
  <!-- ═══════════════════════════════════════ -->

  <!-- Haste direita -->
  <path d="M630,120 Q600,200 615,320 Q625,430 605,560 Q590,650 610,750" fill="none" stroke="#a8c896" stroke-width="2" opacity="0.6"/>

  <!-- Folhas direita -->
  <ellipse cx="612" cy="180" rx="16" ry="7" fill="#8fba78" opacity="0.7" transform="rotate(40,612,180)"/>
  <ellipse cx="618" cy="260" rx="14" ry="6" fill="#a8cc90" opacity="0.65" transform="rotate(-30,618,260)"/>
  <ellipse cx="608" cy="350" rx="15" ry="7" fill="#8fba78" opacity="0.7" transform="rotate(20,608,350)"/>
  <ellipse cx="614" cy="440" rx="13" ry="6" fill="#a8cc90" opacity="0.65" transform="rotate(-15,614,440)"/>
  <ellipse cx="606" cy="530" rx="15" ry="7" fill="#8fba78" opacity="0.68" transform="rotate(35,606,530)"/>
  <ellipse cx="612" cy="620" rx="12" ry="5.5" fill="#a8cc90" opacity="0.6" transform="rotate(-25,612,620)"/>
  <ellipse cx="608" cy="700" rx="14" ry="6.5" fill="#8fba78" opacity="0.65" transform="rotate(10,608,700)"/>

  <!-- Rosas pequenas na borda direita -->
  <g transform="translate(617,210)">
    <ellipse cx="0" cy="0" rx="14" ry="9" fill="url(#roseMid)" opacity="0.8" transform="rotate(0)"/>
    <ellipse cx="0" cy="0" rx="14" ry="9" fill="url(#roseMid)" opacity="0.8" transform="rotate(60)"/>
    <ellipse cx="0" cy="0" rx="14" ry="9" fill="url(#roseMid)" opacity="0.8" transform="rotate(120)"/>
    <ellipse cx="0" cy="0" rx="9" ry="6" fill="url(#roseLight)" opacity="0.9" transform="rotate(30)"/>
    <ellipse cx="0" cy="0" rx="9" ry="6" fill="url(#roseLight)" opacity="0.9" transform="rotate(90)"/>
    <circle cx="0" cy="0" r="4.5" fill="#fde8ee"/>
  </g>

  <g transform="translate(614,390)">
    <ellipse cx="0" cy="0" rx="12" ry="8" fill="url(#roseDeep)" opacity="0.78" transform="rotate(15)"/>
    <ellipse cx="0" cy="0" rx="12" ry="8" fill="url(#roseDeep)" opacity="0.78" transform="rotate(75)"/>
    <ellipse cx="0" cy="0" rx="12" ry="8" fill="url(#roseDeep)" opacity="0.78" transform="rotate(135)"/>
    <ellipse cx="0" cy="0" rx="8" ry="5" fill="url(#roseMid)" opacity="0.9" transform="rotate(45)"/>
    <circle cx="0" cy="0" r="4" fill="#fde0e8"/>
  </g>

  <g transform="translate(610,570)">
    <ellipse cx="0" cy="0" rx="13" ry="8" fill="url(#roseMid)" opacity="0.75" transform="rotate(0)"/>
    <ellipse cx="0" cy="0" rx="13" ry="8" fill="url(#roseMid)" opacity="0.75" transform="rotate(60)"/>
    <ellipse cx="0" cy="0" rx="13" ry="8" fill="url(#roseMid)" opacity="0.75" transform="rotate(120)"/>
    <ellipse cx="0" cy="0" rx="8" ry="5" fill="url(#roseLight)" opacity="0.88" transform="rotate(30)"/>
    <circle cx="0" cy="0" r="4" fill="#fde8ee"/>
  </g>

  <!-- Botões na borda direita -->
  <g transform="translate(623,310)">
    <path d="M0,9 Q-6,3 -4,-3 Q0,-8 4,-3 Q6,3 0,9Z" fill="url(#roseBud)" opacity="0.8"/>
    <path d="M-4,-3 Q-8,-6 -6,-11 Q-2,-8 -4,-3Z" fill="#8fba78" opacity="0.75"/>
    <path d="M4,-3 Q8,-6 6,-11 Q2,-8 4,-3Z" fill="#8fba78" opacity="0.75"/>
  </g>

  <!-- Pétalas caindo (lado direito) -->
  <ellipse cx="595" cy="285" rx="6" ry="3.5" fill="#f9b8cc" opacity="0.55" transform="rotate(25,595,285)"/>
  <ellipse cx="600" cy="470" rx="5" ry="3" fill="#f07ca0" opacity="0.45" transform="rotate(-15,600,470)"/>
  <ellipse cx="592" cy="650" rx="6" ry="3" fill="#fcc8d6" opacity="0.5" transform="rotate(35,592,650)"/>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- FUNDO — arranjo de rosas na parte inferior         -->
  <!-- ═══════════════════════════════════════════════════ -->

  <!-- Haste inferior -->
  <path d="M30,890 Q120,840 280,820 Q420,808 580,840 Q610,848 630,845" fill="none" stroke="#a8c896" stroke-width="2.5" opacity="0.7"/>
  <path d="M50,890 Q160,850 310,832 Q460,818 600,848" fill="none" stroke="#c4dab2" stroke-width="1.2" opacity="0.45"/>

  <!-- Folhas fundo -->
  <ellipse cx="110" cy="848" rx="18" ry="8" fill="#8fba78" opacity="0.75" transform="rotate(25,110,848)"/>
  <ellipse cx="155" cy="838" rx="15" ry="7" fill="#a8cc90" opacity="0.7" transform="rotate(-15,155,838)"/>
  <ellipse cx="200" cy="830" rx="16" ry="7.5" fill="#8fba78" opacity="0.72" transform="rotate(10,200,830)"/>
  <ellipse cx="290" cy="820" rx="18" ry="8" fill="#8fba78" opacity="0.75" transform="rotate(-8,290,820)"/>
  <ellipse cx="350" cy="825" rx="14" ry="6.5" fill="#a8cc90" opacity="0.68" transform="rotate(18,350,825)"/>
  <ellipse cx="430" cy="818" rx="17" ry="7.5" fill="#8fba78" opacity="0.72" transform="rotate(-12,430,818)"/>
  <ellipse cx="505" cy="826" rx="15" ry="7" fill="#a8cc90" opacity="0.7" transform="rotate(22,505,826)"/>
  <ellipse cx="565" cy="835" rx="16" ry="7" fill="#8fba78" opacity="0.7" transform="rotate(-5,565,835)"/>

  <!-- Rosa grande fundo esquerda -->
  <g transform="translate(155,860)">
    <ellipse cx="0" cy="0" rx="26" ry="16" fill="url(#roseDeep)" opacity="0.85" transform="rotate(0)"/>
    <ellipse cx="0" cy="0" rx="26" ry="16" fill="url(#roseDeep)" opacity="0.85" transform="rotate(45)"/>
    <ellipse cx="0" cy="0" rx="26" ry="16" fill="url(#roseDeep)" opacity="0.85" transform="rotate(90)"/>
    <ellipse cx="0" cy="0" rx="26" ry="16" fill="url(#roseDeep)" opacity="0.85" transform="rotate(135)"/>
    <ellipse cx="0" cy="0" rx="18" ry="11" fill="url(#roseMid)" opacity="0.9" transform="rotate(22)"/>
    <ellipse cx="0" cy="0" rx="18" ry="11" fill="url(#roseMid)" opacity="0.9" transform="rotate(67)"/>
    <ellipse cx="0" cy="0" rx="18" ry="11" fill="url(#roseMid)" opacity="0.9" transform="rotate(112)"/>
    <circle cx="0" cy="0" r="8" fill="url(#roseLight)" opacity="1"/>
    <circle cx="-1" cy="-1" r="4" fill="#fde0e8"/>
  </g>

  <!-- Rosa média fundo centro -->
  <g transform="translate(315,845)">
    <ellipse cx="0" cy="0" rx="22" ry="14" fill="url(#roseMid)" opacity="0.85" transform="rotate(10)"/>
    <ellipse cx="0" cy="0" rx="22" ry="14" fill="url(#roseMid)" opacity="0.85" transform="rotate(55)"/>
    <ellipse cx="0" cy="0" rx="22" ry="14" fill="url(#roseMid)" opacity="0.85" transform="rotate(100)"/>
    <ellipse cx="0" cy="0" rx="22" ry="14" fill="url(#roseMid)" opacity="0.85" transform="rotate(145)"/>
    <ellipse cx="0" cy="0" rx="14" ry="9" fill="url(#roseLight)" opacity="0.9" transform="rotate(32)"/>
    <ellipse cx="0" cy="0" rx="14" ry="9" fill="url(#roseLight)" opacity="0.9" transform="rotate(78)"/>
    <circle cx="0" cy="0" r="6" fill="#fde8ee"/>
  </g>

  <!-- Rosa grande fundo direita -->
  <g transform="translate(480,858)">
    <ellipse cx="0" cy="0" rx="25" ry="15" fill="url(#roseDeep)" opacity="0.83" transform="rotate(-10)"/>
    <ellipse cx="0" cy="0" rx="25" ry="15" fill="url(#roseDeep)" opacity="0.83" transform="rotate(35)"/>
    <ellipse cx="0" cy="0" rx="25" ry="15" fill="url(#roseDeep)" opacity="0.83" transform="rotate(80)"/>
    <ellipse cx="0" cy="0" rx="25" ry="15" fill="url(#roseDeep)" opacity="0.83" transform="rotate(125)"/>
    <ellipse cx="0" cy="0" rx="17" ry="10" fill="url(#roseMid)" opacity="0.9" transform="rotate(12)"/>
    <ellipse cx="0" cy="0" rx="17" ry="10" fill="url(#roseMid)" opacity="0.9" transform="rotate(57)"/>
    <ellipse cx="0" cy="0" rx="17" ry="10" fill="url(#roseMid)" opacity="0.9" transform="rotate(102)"/>
    <circle cx="0" cy="0" r="7" fill="url(#roseLight)" opacity="1"/>
    <circle cx="-1" cy="-1" r="3.5" fill="#fde0e8"/>
  </g>

  <!-- Botões fundo -->
  <g transform="translate(250,840)">
    <path d="M0,10 Q-7,3 -5,-4 Q0,-9 5,-4 Q7,3 0,10Z" fill="url(#roseBud)" opacity="0.82"/>
    <path d="M-5,-4 Q-9,-7 -7,-12 Q-3,-9 -5,-4Z" fill="#8fba78" opacity="0.75"/>
    <path d="M5,-4 Q9,-7 7,-12 Q3,-9 5,-4Z" fill="#8fba78" opacity="0.75"/>
  </g>
  <g transform="translate(400,828)">
    <path d="M0,9 Q-6,3 -4,-3 Q0,-8 4,-3 Q6,3 0,9Z" fill="url(#roseBud)" opacity="0.78"/>
    <path d="M-4,-3 Q-8,-6 -6,-11 Q-2,-8 -4,-3Z" fill="#8fba78" opacity="0.72"/>
    <path d="M4,-3 Q8,-6 6,-11 Q2,-8 4,-3Z" fill="#8fba78" opacity="0.72"/>
  </g>

  <!-- Pétalas caindo (fundo) -->
  <ellipse cx="210" cy="798" rx="7" ry="4" fill="#f9b8cc" opacity="0.55" transform="rotate(-18,210,798)"/>
  <ellipse cx="375" cy="805" rx="5.5" ry="3" fill="#f07ca0" opacity="0.48" transform="rotate(22,375,805)"/>
  <ellipse cx="545" cy="800" rx="6" ry="3.5" fill="#fcc8d6" opacity="0.5" transform="rotate(-10,545,800)"/>

  <!-- ═══════════════════════════════════ -->
  <!-- PÉTALAS CAINDO PELO CENTRO         -->
  <!-- (decoração sutil na área de escrita) -->
  <!-- ═══════════════════════════════════ -->
  <ellipse cx="580" cy="200" rx="5" ry="3" fill="#fcc8d6" opacity="0.3" transform="rotate(15,580,200)"/>
  <ellipse cx="570" cy="340" rx="4.5" ry="2.5" fill="#f9b8cc" opacity="0.25" transform="rotate(-20,570,340)"/>
  <ellipse cx="575" cy="480" rx="5" ry="2.8" fill="#fcc8d6" opacity="0.28" transform="rotate(30,575,480)"/>
  <ellipse cx="568" cy="620" rx="4" ry="2.3" fill="#f9b8cc" opacity="0.22" transform="rotate(-12,568,620)"/>

  <!-- Borda externa sutil -->
  <rect x="2" y="2" width="626" height="886" rx="3" fill="none" stroke="#f0c8d4" stroke-width="1.5" opacity="0.4"/>
</svg>
