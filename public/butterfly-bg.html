<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Borboleta Mágica</title>
<style>
  * { margin: 0; padding: 0; }
  body { overflow: hidden; background: transparent; }
  canvas { display: block; position: fixed; top: 0; left: 0; z-index: 0; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(() => {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  let W, H, cx, cy, time = 0;
  const particles = [];
  const MAX_PARTICLES = 160;

  // ========== BUTTERFLY MOVEMENT PATH ==========
  const PADDING = 120;
  const butterflyPath = {
    x: 0, y: 0,
    update(t) {
      const speedMultiplier = 1.6;
      const st = t * speedMultiplier;
      const rangeX = (W / 2) - PADDING;
      const rangeY = (H / 2) - PADDING;
      this.x = cx + Math.sin(st * 0.276) * rangeX * 0.7 + Math.sin(st * 0.132 + 1.2) * rangeX * 0.3;
      this.y = cy + Math.sin(st * 0.204 + 0.5) * rangeY * 0.6 + Math.cos(st * 0.108 + 2.1) * rangeY * 0.35;
    }
  };

  const PARTICLE_COLORS = ['#FFD700', '#FF1493', '#E0FFFF', '#FFFFFF', '#FFB6C1', '#DDA0DD'];

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    cx = W / 2;
    cy = H / 2;
  }
  window.addEventListener('resize', resize);
  resize();

  function drawWing(ctx, side, flapScale, glowAlpha) {
    const s = side;
    ctx.save();
    ctx.scale(s * flapScale, 1);
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.bezierCurveTo(28, -50, 65, -65, 50, -30);
    ctx.bezierCurveTo(72, -55, 80, -20, 45, -5);
    ctx.bezierCurveTo(55, -15, 60, 5, 30, 5);
    ctx.closePath();
    const ugrd = ctx.createRadialGradient(30, -30, 2, 30, -30, 55);
    ugrd.addColorStop(0, `rgba(200, 162, 232, ${0.9 * glowAlpha})`);
    ugrd.addColorStop(0.4, `rgba(140, 80, 200, ${0.7 * glowAlpha})`);
    ugrd.addColorStop(1, `rgba(40, 0, 80, ${0.3 * glowAlpha})`);
    ctx.fillStyle = ugrd;
    ctx.fill();
    ctx.restore();
  }

  function drawButterfly(t) {
    butterflyPath.update(t);
    const bodyX = butterflyPath.x + Math.sin(t * 0.7) * 5;
    const bodyY = butterflyPath.y + Math.sin(t * 1.2) * 8;
    const flapScale = 0.55 + 0.45 * Math.abs(Math.sin(t * 3.5));
    const glowPulse = 0.7 + 0.3 * Math.sin(t * 2);

    ctx.save();
    ctx.globalAlpha = 0.5; // Butterfly transparency
    ctx.translate(bodyX, bodyY);
    ctx.scale(0.5, 0.5); // 50% size

    const glowRadius = 85 + 15 * Math.sin(t * 1.8);
    const outerGlow = ctx.createRadialGradient(0, 0, 10, 0, 0, glowRadius);
    outerGlow.addColorStop(0, `rgba(200, 162, 232, ${0.18 * glowPulse})`);
    outerGlow.addColorStop(1, 'rgba(0, 0, 0, 0)');
    ctx.fillStyle = outerGlow;
    ctx.beginPath();
    ctx.arc(0, 0, glowRadius, 0, Math.PI * 2);
    ctx.fill();

    // Removed rotation
    drawWing(ctx, 1, flapScale, glowPulse);
    drawWing(ctx, -1, flapScale, glowPulse);

    ctx.beginPath();
    ctx.ellipse(0, 0, 2.5, 18, 0, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(140, 100, 180, ${0.8 * glowPulse})`;
    ctx.fill();
    ctx.restore();
    return { x: bodyX, y: bodyY + 10 };
  }

  function draw4PointStar(ctx, x, y, r, alpha, color) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(Math.PI / 4);
    ctx.beginPath();
    for (let i = 0; i < 4; i++) {
      const angle = (Math.PI / 2) * i;
      ctx.lineTo(Math.cos(angle) * r, Math.sin(angle) * r);
      const midAngle = angle + Math.PI / 4;
      ctx.lineTo(Math.cos(midAngle) * r * 0.3, Math.sin(midAngle) * r * 0.3);
    }
    ctx.closePath();
    ctx.fillStyle = color;
    ctx.globalAlpha = alpha;
    ctx.fill();
    ctx.restore();
  }

  class Particle {
    constructor(x, y) { this.reset(x, y); }
    reset(x, y) {
      this.x = x + (Math.random() - 0.5) * 10;
      this.y = y;
      this.originX = this.x;
      this.age = 0;
      this.maxAge = 120 + Math.random() * 160;
      this.speed = 0.6 + Math.random() * 1.2;
      this.size = 1 + Math.random() * 3;
      this.color = PARTICLE_COLORS[Math.floor(Math.random() * PARTICLE_COLORS.length)];
      this.isStar = Math.random() < 0.3;
      this.sFreq = 0.015 + Math.random() * 0.02;
      this.sAmp = 30 + Math.random() * 50;
      this.sPhase = Math.random() * Math.PI * 2;
      this.alive = true;
    }
    update() {
      this.age++;
      if (this.age >= this.maxAge) { this.alive = false; return; }
      this.y += this.speed;
      const progress = this.age / this.maxAge;
      this.x = this.originX + Math.sin(this.age * this.sFreq + this.sPhase) * this.sAmp * progress;
    }
    draw(ctx) {
      const progress = this.age / this.maxAge;
      let alpha = (1 - progress) * (1 - progress);
      if (alpha < 0.01) return;
      const size = this.size * (1 - progress * 0.5);
      if (this.isStar) {
        draw4PointStar(ctx, this.x, this.y, size * 2, alpha, this.color);
      } else {
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.beginPath();
        ctx.arc(this.x, this.y, size, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.fill();
        ctx.restore();
      }
    }
  }

  function spawnParticles(baseX, baseY) {
    const count = Math.random() < 0.6 ? 2 : 1;
    for (let i = 0; i < count; i++) {
      if (particles.length < MAX_PARTICLES) {
        particles.push(new Particle(baseX, baseY));
      } else {
        const dead = particles.find(p => !p.alive);
        if (dead) dead.reset(baseX, baseY);
      }
    }
  }

  function drawBackground() {
    ctx.save();
    ctx.globalAlpha = 1.0;
    const bgGrd = ctx.createRadialGradient(butterflyPath.x, butterflyPath.y, 30, cx, cy, Math.max(W, H) * 0.7);
    bgGrd.addColorStop(0, '#0d0618');
    bgGrd.addColorStop(1, '#000000');
    ctx.fillStyle = bgGrd;
    ctx.fillRect(0, 0, W, H);
    ctx.restore();
  }

  function animate() {
    time += 0.016;
    ctx.clearRect(0, 0, W, H);
    drawBackground();
    const base = drawButterfly(time);
    spawnParticles(base.x, base.y);
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      if (p.alive) { p.update(); p.draw(ctx); }
    }
    requestAnimationFrame(animate);
  }
  animate();
})();
</script>
</body>
</html>
